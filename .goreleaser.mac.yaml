version: 2

project_name: cpa-codex-retry

before:
  hooks:
    - go mod download

builds:
  - id: c-shared-darwin
    main: ./cmd/codex-retry-gateway-plugin
    binary: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if and .Amd64 (ne .Amd64 "v1") }}_{{ .Amd64 }}{{ end }}'
    buildmode: c-shared
    goos: [darwin]
    goarch: [amd64, arm64]
    goamd64: [v1, v3]
    env:
      - CGO_ENABLED=1
    flags: [-trimpath]
    ldflags: [-s -w]

archives:
  - id: c-shared-darwin
    ids: [c-shared-darwin]
    formats: [binary]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if and .Amd64 (ne .Amd64 "v1") }}_{{ .Amd64 }}{{ end }}'

checksum:
  name_template: checksums_darwin.txt

release:
  mode: append

changelog:
  disable: true
